services:
  # Local Ethereum Node (Anvil from Foundry)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: [ "anvil" ]
    command: [ "--host", "0.0.0.0", "--chain-id", "31337" ]
    ports:
      - "8545:8545"
    networks:
      - oracle-network
    healthcheck:
      test: [ "CMD", "cast", "chain-id", "--rpc-url", "http://localhost:8545" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Postgres for Graph Node (C locale required by graph-node)
  postgres:
    image: postgres:14
    command: [ "postgres", "-cshared_preload_libraries=pg_stat_statements" ]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    networks:
      - oracle-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U graph-node" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # IPFS for Graph Node
  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"
    networks:
      - oracle-network

  # The Graph Node
  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: 'ipfs:5001'
      ethereum: 'localhost:http://anvil:8545'
    networks:
      - oracle-network
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
      anvil:
        condition: service_healthy

  # Setup Container to deploy contracts and subgraph
  setup:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "apk add --no-cache curl bash git && npm install --legacy-peer-deps && LOCAL_RPC_URL=http://anvil:8545 ./scripts/setup-local.sh"
    networks:
      - oracle-network
    depends_on:
      anvil:
        condition: service_healthy
      graph-node:
        condition: service_started

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - oracle-network
    depends_on:
      setup:
        condition: service_completed_successfully

networks:
  oracle-network:
    driver: bridge
